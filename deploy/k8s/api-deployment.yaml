apiVersion: apps/v1
kind: Deployment
metadata:
  name: quickmove-api
  namespace: quickmove
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quickmove-api
  template:
    metadata:
      labels:
        app: quickmove-api
    spec:
      containers:
        - name: api
          image: quickmove/server:latest
          ports:
            - containerPort: 5001
          envFrom:
            - secretRef:
                name: quickmove-secrets
            - configMapRef:
                name: quickmove-config
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: quickmove-api
  namespace: quickmove
spec:
  selector:
    app: quickmove-api
  ports:
    - port: 5001
      targetPort: 5001
