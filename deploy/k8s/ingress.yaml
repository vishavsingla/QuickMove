apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: quickmove-ingress
  namespace: quickmove
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  rules:
    - host: quickmove.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: quickmove-api
                port:
                  number: 5001
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: quickmove-api
                port:
                  number: 5001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: quickmove-web
                port:
                  number: 3000
