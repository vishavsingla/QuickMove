apiVersion: apps/v1
kind: Deployment
metadata:
  name: quickmove-web
  namespace: quickmove
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quickmove-web
  template:
    metadata:
      labels:
        app: quickmove-web
    spec:
      containers:
        - name: web
          image: quickmove/client:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: quickmove-config
                  key: API_URL
---
apiVersion: v1
kind: Service
metadata:
  name: quickmove-web
  namespace: quickmove
spec:
  selector:
    app: quickmove-web
  ports:
    - port: 3000
      targetPort: 3000
