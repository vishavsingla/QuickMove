# Render Blueprint — QuickMove API (Express + Socket.io)
# Deploy: connect this repo in Render → New Blueprint → paste this file.
# Free tier: one persistent web service (required for WebSockets).

services:
  - type: web
    name: quickmove-api
    runtime: node
    plan: free
    region: singapore
    rootDir: server
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/index.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5001"
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: ACCESS_TOKEN_PRIVATE_KEY
        generateValue: true
      - key: REFRESH_TOKEN_PRIVATE_KEY
        generateValue: true
      - key: CLIENT_ORIGIN
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: ADMIN_SIGNUP_SECRET
        generateValue: true
      - key: REDIS_URL
        sync: false
