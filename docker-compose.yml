version: "3.9"

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quickmove
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
  # Used for Socket.io adapter + caching in production evolution.
  # Current monolith works without Redis; set REDIS_URL when adapter is wired.

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      DATABASE_URL: postgresql://postgres:postgres@db:5432/quickmove?schema=public
      DIRECT_URL: postgresql://postgres:postgres@db:5432/quickmove?schema=public
      ACCESS_TOKEN_PRIVATE_KEY: ${ACCESS_TOKEN_PRIVATE_KEY:-dev_access_secret}
      REFRESH_TOKEN_PRIVATE_KEY: ${REFRESH_TOKEN_PRIVATE_KEY:-dev_refresh_secret}
      ADMIN_SIGNUP_SECRET: quickmove-admin
      CLIENT_ORIGIN: http://localhost:3000
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5001
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5001
    depends_on:
      - server

volumes:
  pgdata: {}
