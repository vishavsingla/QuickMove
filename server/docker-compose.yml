version: "3.9"

services:
  db:
    container_name: quickmove-db
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quickmove
    ports:
      - "5433:5432"
    volumes:
      - quickmove_pgdata:/var/lib/postgresql/data

volumes:
  quickmove_pgdata: {}
