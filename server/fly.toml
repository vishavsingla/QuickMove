# Fly.io alternative to Render — deploy from server/: fly launch && fly deploy
# Requires: flyctl installed, fly auth login, DATABASE_URL etc. set via fly secrets

app = "quickmove-api"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "5001"

[http_service]
  internal_port = 5001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[deploy]
  release_command = "npx prisma migrate deploy"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
